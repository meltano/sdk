name: Test

on:
  pull_request:
    paths:
      - "packages/**"
      - "samples/**"
      - "singer_sdk/**"
      - "tests/**"
      - "noxfile.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test.yml"
      - ".github/workflows/resources/requirements.txt"
  push:
    branches:
      - main
      - v*
    paths:
      - "packages/**"
      - "samples/**"
      - "singer_sdk/**"
      - "tests/**"
      - "noxfile.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test.yml"
      - ".github/workflows/resources/requirements.txt"
  merge_group:
  workflow_dispatch:
    inputs: {}
  schedule:
    - cron: "0 */4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  UV_CONSTRAINT: ${{ github.workspace }}/.github/workflows/resources/requirements.txt
  UV_VERSION: ">=0.10"

permissions: {}

jobs:
  tests:
    name: "Test on ${{ matrix.python-version }} (${{ matrix.session }}) / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    env:
      NOXFORCEPYTHON: ${{ matrix.python-version }}
      NOXSESSION: ${{ matrix.session }}
    permissions:
      contents: read  # read repository contents
    outputs:
      os: ${{ matrix.os }}
      nox-session: ${{ matrix.session }}
      python-version: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        session: [tests]
        os: ["ubuntu-latest"]
        python-version:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
        - "3.15"
        include:
        - { session: tests,         python-version: "3.14", os: "macos-latest" }
        - { session: tests,         python-version: "3.10", os: "macos-latest" }
        - { session: tests,         python-version: "3.14", os: "windows-latest" }
        - { session: tests,         python-version: "3.10", os: "windows-latest" }
        - { session: doctest,       python-version: "3.14", os: "ubuntu-latest" }
        - { session: deps,          python-version: "3.14", os: "ubuntu-latest" }
        - { session: test-lowest,   python-version: "3.10", os: "ubuntu-latest" }
        - { session: test-contrib,  python-version: "3.10", os: "ubuntu-latest" }
        - { session: test-contrib,  python-version: "3.14", os: "ubuntu-latest" }
        - { session: test-packages, python-version: "3.10", os: "ubuntu-latest" }
        - { session: test-packages, python-version: "3.14", os: "ubuntu-latest" }

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      with:
        cache-suffix: ${{ matrix.session }}
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}

    - name: Install Nox
      run: |
        uv tool install nox
        nox --version

    - name: Run Nox
      run: |
        nox --verbose

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always() && (matrix.session == 'tests' || matrix.session == 'test-contrib' || matrix.session == 'test-packages')
      with:
        include-hidden-files: true
        name: coverage-data-nox_${{ matrix.session }}-${{ matrix.os }}-py${{ matrix.python-version }}
        path: ".coverage.*"

  typing:
    name: Typing
    runs-on: ubuntu-latest
    env:
      NOXFORCEPYTHON: ${{ matrix.python-version }}
    permissions:
      contents: read  # read repository contents
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - "3.10"
        - "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          cache-suffix: typing
          python-version: ${{ matrix.python-version }}
          version: ${{ env.UV_VERSION }}

      - name: Install Nox
        run: |
          uv tool install nox
          nox --version

      - name: Run Nox
        run: |
          nox --verbose --session typing

  tests-external:
    name: External Tests
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.head.repo.fork }}
    env:
      NOXSESSION: test-external
      TAP_GITLAB_AUTH_TOKEN: ${{ secrets.SAMPLE_TAP_GITLAB_AUTH_TOKEN }}
      TAP_GITLAB_GROUP_IDS: ${{ secrets.SAMPLE_TAP_GITLAB_GROUP_IDS }}
      TAP_GITLAB_PROJECT_IDS: ${{ secrets.SAMPLE_TAP_GITLAB_PROJECT_IDS }}
      TAP_GITLAB_START_DATE: "2022-01-01T00:00:00Z"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      with:
        cache-suffix: external
        version: ${{ env.UV_VERSION }}

    - name: Install Nox
      run: |
        uv tool install nox
        nox --version

    - name: Run Nox
      run: |
        nox

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests
    env:
      NOXSESSION: coverage
    strategy:
      fail-fast: false
      matrix:
        include:
        - flag: core
          nox-session: tests
        - flag: optional-components
          nox-session: test-contrib
        - flag: end-to-end
          nox-session: test-packages
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: coverage-data-nox_${{ matrix.nox-session }}-*
        merge-multiple: true

    - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      with:
        cache-suffix: coverage-${{ matrix.flag }}
        version: ${{ env.UV_VERSION }}

    - name: Install Nox
      run: |
        uv tool install nox
        nox --version

    - run: nox --install-only

    - name: Combine coverage data and display human readable report
      run: |
        nox -r --no-install -- combine --debug=pathmap
        nox -r --no-install -- report --show-missing --ignore-errors

    - name: Create coverage report
      run: |
        nox -r --no-install -- xml

    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        fail_ci_if_error: true
        flags: ${{ matrix.flag }}
        token: ${{ secrets.CODECOV_TOKEN }}
