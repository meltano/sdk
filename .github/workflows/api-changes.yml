name: API Changes

on:
  pull_request:
    paths:
    - singer_sdk/**
    - .github/workflows/api-changes.yml
    - .github/workflows/resources/requirements.txt
    - CHANGELOG.md
    - noxfile.py
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  UV_CONSTRAINT: ${{ github.workspace }}/.github/workflows/resources/requirements.txt
  UV_VERSION: ">=0.10"

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  check-api-changes:
    name: Check API Changes
    runs-on: ubuntu-latest
    env:
      NOXSESSION: api
    steps:
    - name: Check out the repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false

    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        cache-suffix: api-changes
        version: ${{ env.UV_VERSION }}

    - name: Install tools
      run: |
        uv tool install nox
        uv tool list

    - name: Set REF
      id: set-ref
      if: always() && !startsWith(github.head_ref, 'release/')
      env:
        GIT_REF: ${{ github.event.pull_request.base.sha }}
      run: |
        echo "ref=${GIT_REF}" >> "$GITHUB_OUTPUT"

    # Check API against the latest commit on the base branch
    - name: Run Nox
      run: |
        nox -- "${STEPS_SET_REF_OUTPUTS_REF}"
      env:
        STEPS_SET_REF_OUTPUTS_REF: ${{ steps.set-ref.outputs.ref }}
